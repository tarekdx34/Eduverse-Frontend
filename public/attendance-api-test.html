<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVerse — Attendance API test</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e7edf5;
        --muted: #8b9cb3;
        --accent: #3b82f6;
        --accent-dim: #2563eb;
        --ok: #22c55e;
        --err: #ef4444;
        --radius: 10px;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 1.5rem 1.25rem 3rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .sub code {
        background: var(--surface);
        padding: 0.15rem 0.45rem;
        border-radius: 6px;
        font-size: 0.85em;
      }
      section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.1rem;
        margin-bottom: 1rem;
      }
      section h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 0.85rem;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.9rem;
        margin-bottom: 0.65rem;
      }
      textarea {
        min-height: 4rem;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
      button {
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 0.9rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }
      button:hover {
        background: var(--accent-dim);
      }
      button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      button.secondary:hover {
        border-color: var(--muted);
      }
      #log {
        background: #080b0f;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.85rem 1rem;
        font-size: 0.78rem;
        line-height: 1.45;
        overflow: auto;
        max-height: 320px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #a8c4e8;
      }
      .log-ok {
        color: var(--ok);
      }
      .log-err {
        color: var(--err);
      }
      .token-pill {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Attendance API test harness</h1>
      <p class="sub">
        Run the frontend with <code>npm run dev</code>, then open
        <code>/attendance-api-test.html</code> (Vite proxies <code>/api</code> and
        <code>/attendance</code> per <code>vite.config.js</code>). Or set API base to your backend
        URL (e.g. <code>http://localhost:3001</code>).
      </p>

      <section>
        <h2>Connection</h2>
        <label for="apiBase">API base URL (leave empty when using Vite dev + proxy)</label>
        <input id="apiBase" type="text" placeholder="e.g. http://localhost:8081" autocomplete="off" />
        <button type="button" class="secondary" id="btnSaveBase">Save base to localStorage</button>
      </section>

      <section>
        <h2>Login (JWT)</h2>
        <div class="row">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="username" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" />
          </div>
        </div>
        <button type="button" id="btnLogin">POST /api/auth/login</button>
        <button type="button" class="secondary" id="btnClearToken">Clear saved token</button>
        <p class="token-pill" id="tokenStatus">No token stored.</p>
      </section>

      <section>
        <h2>Sessions</h2>
        <div class="row">
          <div>
            <label for="sectionId">Section ID</label>
            <input id="sectionId" type="number" value="1" min="1" />
          </div>
          <div>
            <label for="sessionDate">Session date</label>
            <input id="sessionDate" type="date" />
          </div>
        </div>
        <label for="sessionType">Session type</label>
        <select id="sessionType">
          <option value="lecture">lecture</option>
          <option value="lab">lab</option>
          <option value="tutorial">tutorial</option>
          <option value="exam">exam</option>
        </select>
        <button type="button" id="btnCreateSession">POST /attendance/sessions</button>
        <button type="button" id="btnListSessions">GET /attendance/sessions</button>
        <div class="row">
          <div>
            <label for="sessionIdDetail">Session ID (detail / records)</label>
            <input id="sessionIdDetail" type="number" value="1" min="1" />
          </div>
        </div>
        <button type="button" class="secondary" id="btnGetSession">GET /attendance/sessions/:id</button>
        <button type="button" class="secondary" id="btnGetRecords">GET /attendance/sessions/:id/records</button>
      </section>

      <section>
        <h2>Mark attendance</h2>
        <div class="row">
          <div>
            <label for="markSessionId">Session ID</label>
            <input id="markSessionId" type="number" value="1" min="1" />
          </div>
          <div>
            <label for="markUserId">Student user ID</label>
            <input id="markUserId" type="number" value="1" min="1" />
          </div>
        </div>
        <label for="markStatus">Status</label>
        <select id="markStatus">
          <option value="present">present</option>
          <option value="absent">absent</option>
          <option value="late">late</option>
          <option value="excused">excused</option>
        </select>
        <button type="button" id="btnMarkOne">POST /attendance/records</button>
        <label for="batchJson">Batch body (POST /attendance/records/batch)</label>
        <textarea id="batchJson" spellcheck="false">
{
  "sessionId": 1,
  "records": [
    { "userId": 1, "attendanceStatus": "present" },
    { "userId": 2, "attendanceStatus": "absent" }
  ]
}
        </textarea>
        <button type="button" id="btnBatch">POST /attendance/records/batch</button>
      </section>

      <section>
        <h2>Log</h2>
        <button type="button" class="secondary" id="btnClearLog">Clear log</button>
        <pre id="log"></pre>
      </section>
    </div>

    <script>
      const STORAGE_BASE = 'eduverse_attendance_test_api_base';
      const STORAGE_TOKEN = 'eduverse_attendance_test_token';

      const $ = (id) => document.getElementById(id);
      const logEl = $('log');

      function apiBase() {
        const raw = ($('apiBase').value || '').trim().replace(/\/$/, '');
        return raw;
      }

      function url(path) {
        const base = apiBase();
        if (!path.startsWith('/')) path = '/' + path;
        return base ? base + path : path;
      }

      function log(msg, cls) {
        const line = document.createElement('div');
        if (cls) line.className = cls;
        line.textContent = `[${new Date().toISOString()}] ${msg}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function authHeaders() {
        const t = localStorage.getItem(STORAGE_TOKEN);
        const h = { 'Content-Type': 'application/json', Accept: 'application/json' };
        if (t) h['Authorization'] = 'Bearer ' + t;
        return h;
      }

      async function parseBody(res) {
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch {
          return text;
        }
      }

      async function doFetch(method, path, body) {
        const headers = authHeaders();
        if (method === 'GET') delete headers['Content-Type'];
        const opts = { method, headers };
        if (body !== undefined) opts.body = JSON.stringify(body);
        const res = await fetch(url(path), opts);
        const data = await parseBody(res);
        const summary = `${method} ${path} → ${res.status}`;
        if (res.ok) {
          log(summary + '\n' + JSON.stringify(data, null, 2), 'log-ok');
        } else {
          log(summary + '\n' + JSON.stringify(data, null, 2), 'log-err');
        }
        return { res, data };
      }

      function refreshTokenStatus() {
        const t = localStorage.getItem(STORAGE_TOKEN);
        $('tokenStatus').textContent = t
          ? 'Token in localStorage (' + t.slice(0, 24) + '…)'
          : 'No token stored.';
      }

      $('apiBase').value = localStorage.getItem(STORAGE_BASE) || '';
      const today = new Date().toISOString().slice(0, 10);
      $('sessionDate').value = today;
      refreshTokenStatus();

      $('btnSaveBase').onclick = () => {
        localStorage.setItem(STORAGE_BASE, $('apiBase').value.trim());
        log('Saved API base to localStorage.');
      };

      $('btnClearToken').onclick = () => {
        localStorage.removeItem(STORAGE_TOKEN);
        refreshTokenStatus();
        log('Token cleared.');
      };

      $('btnClearLog').onclick = () => {
        logEl.innerHTML = '';
      };

      $('btnLogin').onclick = async () => {
        const email = $('email').value.trim();
        const password = $('password').value;
        const headers = { 'Content-Type': 'application/json', Accept: 'application/json' };
        const res = await fetch(url('/api/auth/login'), {
          method: 'POST',
          headers,
          body: JSON.stringify({ email, password }),
        });
        const data = await parseBody(res);
        const summary = `POST /api/auth/login → ${res.status}`;
        if (res.ok) {
          log(summary + '\n' + JSON.stringify(data, null, 2), 'log-ok');
          if (data.accessToken) {
            localStorage.setItem(STORAGE_TOKEN, data.accessToken);
            refreshTokenStatus();
          }
        } else {
          log(summary + '\n' + JSON.stringify(data, null, 2), 'log-err');
        }
      };

      $('btnCreateSession').onclick = async () => {
        const sectionId = Number($('sectionId').value);
        const sessionDate = $('sessionDate').value;
        const sessionType = $('sessionType').value;
        await doFetch('POST', '/attendance/sessions', {
          sectionId,
          sessionDate,
          sessionType,
        });
      };

      $('btnListSessions').onclick = async () => {
        const sid = $('sectionId').value;
        const q = sid ? '?sectionId=' + encodeURIComponent(sid) : '';
        await doFetch('GET', '/attendance/sessions' + q);
      };

      $('btnGetSession').onclick = async () => {
        const id = $('sessionIdDetail').value;
        await doFetch('GET', '/attendance/sessions/' + id);
      };

      $('btnGetRecords').onclick = async () => {
        const id = $('sessionIdDetail').value;
        await doFetch('GET', '/attendance/sessions/' + id + '/records');
      };

      $('btnMarkOne').onclick = async () => {
        await doFetch('POST', '/attendance/records', {
          sessionId: Number($('markSessionId').value),
          userId: Number($('markUserId').value),
          attendanceStatus: $('markStatus').value,
        });
      };

      $('btnBatch').onclick = async () => {
        let body;
        try {
          body = JSON.parse($('batchJson').value);
        } catch (e) {
          log('Invalid JSON in batch body: ' + e.message, 'log-err');
          return;
        }
        await doFetch('POST', '/attendance/records/batch', body);
      };

    </script>
  </body>
</html>
