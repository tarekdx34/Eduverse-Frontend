<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVerse Chat – Socket.IO Tester</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    /* ── Reset & Tokens ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --card:     #22263a;
      --border:   #2e3350;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --danger:   #ff4d6d;
      --warn:     #ffa940;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --bubble-a: #6c63ff;
      --bubble-b: #2e3350;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }
    header span { font-size: .78rem; color: var(--muted); }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; padding: 3px 10px; border-radius: 20px;
      background: var(--card); border: 1px solid var(--border);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: background .3s; }
    .dot.online  { background: #00d4aa; box-shadow: 0 0 6px #00d4aa80; }
    .dot.offline { background: #ff4d6d; }

    /* ── Server Config Bar ───────────────────────────────────── */
    .config-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .config-bar label { font-size: .78rem; color: var(--muted); white-space: nowrap; }
    .config-bar input {
      flex: 1; min-width: 240px; max-width: 380px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: .82rem;
    }
    .config-bar input:focus { outline: none; border-color: var(--accent); }

    /* ── Main Layout ─────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

    /* ── Chat Panel ──────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .panel-header h2 { font-size: .95rem; font-weight: 600; flex: 1; }
    .panel-header .status-badge {
      font-size: .7rem; padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
    }
    .panel-header .status-badge.connected { color: var(--accent2); border-color: var(--accent2); }
    .panel-header .status-badge.disconnected { color: var(--danger); border-color: var(--danger); }

    /* ── Auth Section ────────────────────────────────────────── */
    .auth-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .auth-section .row { display: flex; gap: 8px; align-items: center; }
    .auth-section label { font-size: .72rem; color: var(--muted); min-width: 80px; }
    .auth-section input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: .78rem;
    }
    .auth-section input:focus { outline: none; border-color: var(--accent); }
    .auth-section .hint { font-size: .68rem; color: var(--muted); margin-top: 2px; }

    /* ── Quick Login ──────────────────────────────────────────── */
    .quick-login {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .quick-login label { font-size: .72rem; color: var(--muted); }

    /* ── Buttons ─────────────────────────────────────────────── */
    button {
      cursor: pointer; border: none; border-radius: 6px;
      font-size: .78rem; font-weight: 600; padding: 6px 14px;
      transition: opacity .15s, transform .1s;
    }
    button:hover { opacity: .85; }
    button:active { transform: scale(.97); }

    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-success  { background: var(--accent2); color: #0f1117; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-warn     { background: var(--warn);    color: #0f1117; }
    .btn-ghost    { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-sm       { padding: 4px 10px; font-size: .72rem; }
    button:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Controls (join/leave) ───────────────────────────────── */
    .controls {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .controls input {
      width: 90px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 6px; font-size: .78rem;
      text-align: center;
    }
    .controls input:focus { outline: none; border-color: var(--accent); }
    .controls label { font-size: .72rem; color: var(--muted); }

    /* ── Start Chat bar ─────────────────────────────────────── */
    .start-chat {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      background: rgba(0,200,120,.04);
    }
    .start-chat label { font-size: .72rem; color: var(--accent); font-weight: 600; }
    .start-chat input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 5px 8px; border-radius: 6px; font-size: .78rem;
    }
    .start-chat input:focus { outline: none; border-color: var(--accent); }
    .start-chat input[placeholder="First message…"] { flex: 1; min-width: 100px; }

    /* ── User search results dropdown ──────────────────────── */
    .start-chat { position: relative; }
    .search-results {
      display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      max-height: 180px; overflow-y: auto; box-shadow: var(--shadow);
    }
    .search-results.visible { display: block; }
    .search-result-item {
      padding: 7px 14px; cursor: pointer; font-size: .82rem;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(108,99,255,.15); }
    .search-result-item .sr-name { color: var(--text); font-weight: 600; }
    .search-result-item .sr-email { color: var(--muted); font-size: .72rem; margin-left: 6px; }
    .search-result-item .sr-uid { color: var(--accent); font-size: .7rem; float: right; }

    /* ── Notification banner ─────────────────────────────────── */
    .notif-banner {
      display: none; align-items: center; gap: 10px;
      padding: 7px 14px;
      background: rgba(99,179,237,.13);
      border-bottom: 1px solid rgba(99,179,237,.3);
      font-size: .78rem;
    }
    .notif-banner.visible { display: flex; }
    .notif-text { flex: 1; color: var(--text); }
    .notif-dismiss { cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0 4px; }
    .notif-dismiss:hover { color: var(--danger); }

    /* ── Message Feed ────────────────────────────────────────── */
    .feed {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Log items */
    .log-item {
      font-size: .75rem; padding: 6px 10px; border-radius: 8px;
      border-left: 3px solid transparent; background: var(--card);
      word-break: break-word;
    }
    .log-item.system  { border-color: var(--muted);  color: var(--muted); font-style: italic; }
    .log-item.sent    { border-color: var(--accent);  background: #6c63ff18; }
    .log-item.recv    { border-color: var(--accent2); background: #00d4aa18; }
    .log-item.error   { border-color: var(--danger);  background: #ff4d6d18; color: var(--danger); }
    .log-item.typing  { border-color: var(--warn);    background: #ffa94018; color: var(--warn); font-style: italic; }
    .log-item.read    { border-color: #a78bfa;        background: #a78bfa18; }
    .log-item.deleted { border-color: var(--danger);  background: #ff4d6d10; opacity: .8; }

    .log-item .ts { opacity: .5; margin-right: 6px; font-size: .68rem; }
    .log-item .event-tag {
      display: inline-block; font-size: .65rem; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-right: 6px;
      background: rgba(255,255,255,.08);
    }
    .log-item pre {
      margin-top: 4px; font-size: .7rem; white-space: pre-wrap;
      opacity: .8; font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    /* Bubble messages */
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.self { align-items: flex-end; }
    .bubble-wrap.other { align-items: flex-start; }
    .bubble-sender { font-size: .68rem; color: var(--muted); margin-bottom: 2px; padding: 0 4px; }
    .bubble {
      max-width: 85%; padding: 8px 12px; border-radius: 14px;
      font-size: .82rem; line-height: 1.45; word-break: break-word;
      cursor: pointer; position: relative;
      transition: filter .15s;
    }
    .bubble:hover { filter: brightness(1.12); }
    .bubble:hover::after {
      content: '↩ reply'; position: absolute; top: -18px;
      font-size: .62rem; color: var(--accent2); background: var(--card);
      padding: 1px 6px; border-radius: 4px; white-space: nowrap;
      pointer-events: none;
    }
    .bubble-wrap.self  .bubble { background: var(--bubble-a); color: #fff; border-bottom-right-radius: 4px; }
    .bubble-wrap.other .bubble { background: var(--bubble-b); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-meta { font-size: .65rem; color: var(--muted); margin-top: 2px; padding: 0 4px; display:flex; gap:4px; align-items:center; }
    .bubble-actions { margin-left: auto; display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
    .bubble-wrap:hover .bubble-actions { opacity: 1; }
    .bubble-actions a { color: var(--muted); text-decoration: none; font-size: .72rem; padding: 0 3px; }
    .bubble-actions a:hover { color: var(--accent); }
    .tick { font-size: .7rem; color: var(--muted); }
    .tick.read { color: var(--accent2); }

    /* Quote block inside bubble */
    .quote-block {
      border-left: 3px solid rgba(255,255,255,.4);
      background: rgba(0,0,0,.18);
      border-radius: 6px;
      padding: 4px 8px;
      margin-bottom: 5px;
      font-size: .74rem;
      opacity: .85;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .bubble-wrap.other .quote-block {
      border-color: var(--accent2);
      background: rgba(0,212,170,.08);
    }
    .quote-block .quote-id { font-size: .65rem; opacity: .6; margin-right: 4px; }

    /* Reply preview bar */
    .reply-bar {
      display: none; align-items: center; gap: 8px;
      padding: 5px 10px; background: var(--card);
      border-left: 3px solid var(--accent2); border-radius: 6px;
      font-size: .75rem; color: var(--muted);
    }
    .reply-bar.visible { display: flex; }
    .reply-bar .reply-text { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .reply-bar .reply-cancel { cursor: pointer; font-size: .85rem; color: var(--danger); }

    /* ── Compose Area ────────────────────────────────────────── */
    .compose {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-direction: column;
    }
    .compose-row { display: flex; gap: 8px; align-items: flex-end; }
    .compose textarea {
      flex: 1; resize: none; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 8px 10px; border-radius: 8px; font-size: .82rem;
      font-family: inherit; line-height: 1.4; min-height: 36px; max-height: 100px;
    }
    .compose textarea:focus { outline: none; border-color: var(--accent); }
    .compose-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .compose-actions label { font-size: .68rem; color: var(--muted); }
    .compose-actions input {
      width: 70px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 4px 6px; border-radius: 6px; font-size: .72rem;
      text-align: center;
    }
    .compose-actions input:focus { outline: none; border-color: var(--accent); }

    /* ── Log Toggle ──────────────────────────────────────────── */
    .log-toggle {
      display: flex; gap: 6px; padding: 6px 14px;
      border-bottom: 1px solid var(--border);
    }
    .log-toggle button {
      font-size: .68rem; padding: 3px 10px;
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border); border-radius: 20px;
    }
    .log-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Start Chat Bar ──────────────────────────────────────── */
    .start-chat {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      background: rgba(108,99,255,.06);
    }
    .start-chat label { font-size: .72rem; color: var(--accent2); font-weight: 600; white-space: nowrap; }
    .start-chat input {
      flex: 1; min-width: 80px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: .78rem;
    }
    .start-chat input:focus { outline: none; border-color: var(--accent2); }

    /* ── Incoming notification banner ───────────────────────── */
    .notif-banner {
      display: none; margin: 6px 14px; padding: 8px 12px;
      background: rgba(0,212,170,.12); border: 1px solid var(--accent2);
      border-radius: 8px; font-size: .78rem; align-items: center; gap: 8px;
    }
    .notif-banner.visible { display: flex; }
    .notif-banner .notif-text { flex: 1; }
    .notif-banner .notif-dismiss { cursor:pointer; color:var(--muted); font-size:.85rem; }

    /* ── New Conversation Modal ──────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; width: 340px;
      box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
    }
    .modal h3 { font-size: .95rem; font-weight: 700; }
    .modal label { font-size: .75rem; color: var(--muted); }
    .modal input, .modal select, .modal textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: 6px;
      font-size: .82rem; font-family: inherit;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    /* ── Divider ──────────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 8px;
      font-size: .65rem; color: var(--muted); padding: 4px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════ -->
<header>
  <h1>⚡ EduVerse Chat Tester</h1>
  <span>Socket.IO live messaging – dual client</span>
  <div style="flex:1"></div>
  <span style="font-size:.72rem; color:var(--muted);">Server:</span>
  <code id="serverDisplay" style="font-size:.72rem; color:var(--accent2);"></code>
</header>

<!-- ══ CONFIG BAR ══════════════════════════════════════════════ -->
<div class="config-bar">
  <label>🌐 Server URL</label>
  <input id="serverUrl" value="http://localhost:8081" placeholder="http://localhost:8081" />
  <label>📌 Namespace</label>
  <input id="namespace" value="/messaging" style="max-width:130px;" />
  <button class="btn-ghost btn-sm" onclick="applyServerConfig()">Apply</button>
  <span style="font-size:.7rem; color:var(--muted);">Changes take effect on next connect</span>
</div>

<!-- ══ MAIN PANELS ═════════════════════════════════════════════ -->
<main>

  <!-- ────────── PANEL A ────────── -->
  <div class="panel" id="panelA">
    <div class="panel-header">
      <span class="dot" id="dotA"></span>
      <h2>👤 User A</h2>
      <span class="status-badge disconnected" id="badgeA">Disconnected</span>
    </div>

    <!-- Quick Login -->
    <div class="quick-login">
      <label>Quick login →</label>
      <select id="presetA" onchange="applyPreset('A')" style="background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;">
        <option value="">-- Pick a user --</option>
        <option value="student">🎓 Student (student.tarek)</option>
        <option value="instructor">👨‍🏫 Instructor (instructor.tarek)</option>
        <option value="admin">🛡️ Admin (admin.tarek)</option>
        <option value="ta">📋 TA (ta.tarek)</option>
        <option value="it_admin">🔧 IT Admin (it_admin.tarek)</option>
      </select>
      <input id="emailA" placeholder="email@example.com" value="student.tarek@example.com" style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;" />
      <input id="passA" type="password" placeholder="password" value="SecureP@ss123" style="width:120px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;" />
      <button class="btn-success btn-sm" onclick="quickLogin('A')">Login &amp; Connect</button>
    </div>

    <!-- Manual token -->
    <div class="auth-section">
      <div class="row">
        <label>JWT Token</label>
        <input id="tokenA" type="password" placeholder="Paste JWT token (or use quick login above)" />
        <button class="btn-primary btn-sm" onclick="connectPanel('A')">Connect</button>
        <button class="btn-danger btn-sm" onclick="disconnectPanel('A')">Disconnect</button>
      </div>
      <div class="hint" id="userInfoA">Not connected</div>
    </div>

    <!-- Start Chat -->
    <div class="start-chat">
      <label>💬 Chat with:</label>
      <input id="userSearchA" placeholder="Search by name or email…" oninput="searchUsers('A')" autocomplete="off" style="flex:1; min-width:120px;" />
      <div class="search-results" id="searchResultsA"></div>
      <input id="targetUidA" type="number" placeholder="uid" style="width:60px;" />
      <input id="firstMsgA" placeholder="First message…" />
      <button class="btn-success btn-sm" onclick="startChat('A')">Start Chat ↗</button>
    </div>

    <!-- Incoming notification -->
    <div class="notif-banner" id="notifA">
      <span class="notif-text" id="notifTextA"></span>
      <button class="btn-success btn-sm" id="notifJoinA" onclick="joinNotifConv('A')">Join Chat</button>
      <span class="notif-dismiss" onclick="dismissNotif('A')">✕</span>
    </div>

    <!-- Active conv indicator + controls -->
    <div class="controls">
      <label>Active conv:</label>
      <input id="convIdA" type="number" value="" min="1" placeholder="none" style="width:70px;" />
      <button class="btn-success btn-sm" onclick="joinConv('A')">Join</button>
      <button class="btn-warn btn-sm" onclick="leaveConv('A')">Leave</button>
      <button class="btn-ghost btn-sm" onclick="markRead('A')">✓ Read</button>
      <button class="btn-ghost btn-sm clear-btn" onclick="clearFeed('A')">🗑</button>
    </div>

    <!-- View Toggle -->
    <div class="log-toggle">
      <button id="viewBubbleA" class="active" onclick="setView('A','bubble')">💬 Chat</button>
      <button id="viewLogA" onclick="setView('A','log')">📋 Event Log</button>
    </div>

    <!-- Feed -->
    <div class="feed" id="feedA"></div>

    <!-- Compose -->
    <div class="compose">
      <div class="reply-bar" id="replyBarA">
        <span>↩ Replying to</span>
        <span class="reply-text" id="replyPreviewA"></span>
        <span class="reply-cancel" onclick="cancelReply('A')">✕</span>
      </div>
      <div class="compose-row">
        <textarea id="msgA" placeholder="Type a message… (Enter to send, Shift+Enter new line)" rows="1"
          oninput="autoResize(this); emitTyping('A', true)"
          onblur="emitTyping('A', false)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('A');}"></textarea>
        <button class="btn-primary" onclick="sendMsg('A')">Send ↑</button>
      </div>
      <div class="compose-actions">
        <input type="hidden" id="replyToA" />
        <label>Del msg #</label>
        <input id="delMsgA" type="number" placeholder="msg id" />
        <button class="btn-danger btn-sm" onclick="deleteMsg('A', true)">Del Everyone</button>
        <button class="btn-warn btn-sm" onclick="deleteMsg('A', false)">Del Me</button>
      </div>
    </div>
  </div><!-- /panelA -->

  <!-- ────────── PANEL B ────────── -->
  <div class="panel" id="panelB">
    <div class="panel-header">
      <span class="dot" id="dotB"></span>
      <h2>👤 User B</h2>
      <span class="status-badge disconnected" id="badgeB">Disconnected</span>
    </div>

    <!-- Quick Login -->
    <div class="quick-login">
      <label>Quick login →</label>
      <select id="presetB" onchange="applyPreset('B')" style="background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;">
        <option value="">-- Pick a user --</option>
        <option value="student">🎓 Student (student.tarek)</option>
        <option value="instructor" selected>👨‍🏫 Instructor (instructor.tarek)</option>
        <option value="admin">🛡️ Admin (admin.tarek)</option>
        <option value="ta">📋 TA (ta.tarek)</option>
        <option value="it_admin">🔧 IT Admin (it_admin.tarek)</option>
      </select>
      <input id="emailB" placeholder="email@example.com" value="instructor.tarek@example.com" style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;" />
      <input id="passB" type="password" placeholder="password" value="SecureP@ss123" style="width:120px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:6px; font-size:.75rem;" />
      <button class="btn-success btn-sm" onclick="quickLogin('B')">Login &amp; Connect</button>
    </div>

    <!-- Manual token -->
    <div class="auth-section">
      <div class="row">
        <label>JWT Token</label>
        <input id="tokenB" type="password" placeholder="Paste JWT token (or use quick login above)" />
        <button class="btn-primary btn-sm" onclick="connectPanel('B')">Connect</button>
        <button class="btn-danger btn-sm" onclick="disconnectPanel('B')">Disconnect</button>
      </div>
      <div class="hint" id="userInfoB">Not connected</div>
    </div>

    <!-- Start Chat -->
    <div class="start-chat">
      <label>💬 Chat with:</label>
      <input id="userSearchB" placeholder="Search by name or email…" oninput="searchUsers('B')" autocomplete="off" style="flex:1; min-width:120px;" />
      <div class="search-results" id="searchResultsB"></div>
      <input id="targetUidB" type="number" placeholder="uid" style="width:60px;" />
      <input id="firstMsgB" placeholder="First message…" />
      <button class="btn-success btn-sm" onclick="startChat('B')">Start Chat ↗</button>
    </div>

    <!-- Incoming notification -->
    <div class="notif-banner" id="notifB">
      <span class="notif-text" id="notifTextB"></span>
      <button class="btn-success btn-sm" id="notifJoinB" onclick="joinNotifConv('B')">Join Chat</button>
      <span class="notif-dismiss" onclick="dismissNotif('B')">✕</span>
    </div>

    <!-- Active conv indicator + controls -->
    <div class="controls">
      <label>Active conv:</label>
      <input id="convIdB" type="number" value="" min="1" placeholder="none" style="width:70px;" />
      <button class="btn-success btn-sm" onclick="joinConv('B')">Join</button>
      <button class="btn-warn btn-sm" onclick="leaveConv('B')">Leave</button>
      <button class="btn-ghost btn-sm" onclick="markRead('B')">✓ Read</button>
      <button class="btn-ghost btn-sm clear-btn" onclick="clearFeed('B')">🗑</button>

    <!-- View Toggle -->
    <div class="log-toggle">
      <button id="viewBubbleB" class="active" onclick="setView('B','bubble')">💬 Chat</button>
      <button id="viewLogB" onclick="setView('B','log')">📋 Event Log</button>
    </div>

    <!-- Feed -->
    <div class="feed" id="feedB"></div>

    <!-- Compose -->
    <div class="compose">
      <div class="reply-bar" id="replyBarB">
        <span>↩ Replying to</span>
        <span class="reply-text" id="replyPreviewB"></span>
        <span class="reply-cancel" onclick="cancelReply('B')">✕</span>
      </div>
      <div class="compose-row">
        <textarea id="msgB" placeholder="Type a message… (Enter to send, Shift+Enter new line)" rows="1"
          oninput="autoResize(this); emitTyping('B', true)"
          onblur="emitTyping('B', false)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('B');}"></textarea>
        <button class="btn-primary" onclick="sendMsg('B')">Send ↑</button>
      </div>
      <div class="compose-actions">
        <input type="hidden" id="replyToB" />
        <label>Del msg #</label>
        <input id="delMsgB" type="number" placeholder="msg id" />
        <button class="btn-danger btn-sm" onclick="deleteMsg('B', true)">Del Everyone</button>
        <button class="btn-warn btn-sm" onclick="deleteMsg('B', false)">Del Me</button>
      </div>
    </div>
  </div><!-- /panelB -->

</main>

<!-- ══ SCRIPT ══════════════════════════════════════════════════ -->
<script>
/* ────────────────────────────────────────────────────────────
   STATE
──────────────────────────────────────────────────────────── */
const state = {
  A: { socket: null, view: 'bubble', userId: null, email: null, convId: null, typingTimer: null, msgCache: {}, pendingReply: null, notifConvId: null },
  B: { socket: null, view: 'bubble', userId: null, email: null, convId: null, typingTimer: null, msgCache: {}, pendingReply: null, notifConvId: null },
};

let SERVER_URL = 'http://localhost:8081';
let NAMESPACE  = '/messaging';

document.getElementById('serverDisplay').textContent = SERVER_URL + NAMESPACE;

function applyServerConfig() {
  SERVER_URL = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
  NAMESPACE  = document.getElementById('namespace').value.trim() || '/messaging';
  document.getElementById('serverDisplay').textContent = SERVER_URL + NAMESPACE;
  log('A', 'system', `Server config updated → ${SERVER_URL}${NAMESPACE}`);
  log('B', 'system', `Server config updated → ${SERVER_URL}${NAMESPACE}`);
}

/* ── User Presets ── */
const USER_PRESETS = {
  student:    { email: 'student.tarek@example.com',  password: 'SecureP@ss123' },
  instructor: { email: 'instructor.tarek@example.com', password: 'SecureP@ss123' },
  admin:      { email: 'admin.tarek@example.com',   password: 'SecureP@ss123' },
  ta:         { email: 'ta.tarek@example.com',       password: 'SecureP@ss123' },
  it_admin:   { email: 'it_admin.tarek@example.com', password: 'SecureP@ss123' },
};

function applyPreset(id) {
  const sel = document.getElementById(`preset${id}`).value;
  if (!sel || !USER_PRESETS[sel]) return;
  document.getElementById(`email${id}`).value = USER_PRESETS[sel].email;
  document.getElementById(`pass${id}`).value  = USER_PRESETS[sel].password;
}

/* ────────────────────────────────────────────────────────────
   QUICK LOGIN (fetch JWT from REST)
──────────────────────────────────────────────────────────── */
async function quickLogin(id) {
  const email = document.getElementById(`email${id}`).value.trim();
  const pass  = document.getElementById(`pass${id}`).value.trim();
  if (!email || !pass) { alert('Enter email and password first.'); return; }

  log(id, 'system', `Logging in as ${email}…`);
  try {
    const res = await fetch(`${SERVER_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass, rememberMe: false }),
    });
    const data = await res.json();

    // Backend returns { accessToken, refreshToken, user }
    const token = data.accessToken || data.access_token || data.token
               || data.data?.accessToken || data.data?.access_token;

    if (!token) {
      log(id, 'error', `Login failed: ${JSON.stringify(data)}`);
      return;
    }
    log(id, 'recv', `✅ Login OK — token received`);
    // Show user info from response if available
    if (data.user) {
      log(id, 'system', `👤 Logged in as: ${data.user.firstName || ''} ${data.user.lastName || ''} (${data.user.email || email}) — Role: ${data.user.role || 'N/A'}`);
    }
    document.getElementById(`token${id}`).value = token;
    connectPanel(id);
  } catch (e) {
    log(id, 'error', `Login error: ${e.message}`);
  }
}

/* ────────────────────────────────────────────────────────────
   CONNECT / DISCONNECT
──────────────────────────────────────────────────────────── */
function connectPanel(id) {
  const token = document.getElementById(`token${id}`).value.trim();
  if (!token) { alert(`Enter a JWT token for User ${id}`); return; }

  disconnectPanel(id);   // clean up existing socket

  log(id, 'system', `Connecting to ${SERVER_URL}${NAMESPACE}…`);

  const socket = io(SERVER_URL + NAMESPACE, {
    auth:  { token },
    query: { token },
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1500,
  });

  state[id].socket = socket;
  registerEvents(id, socket, token);
}

function disconnectPanel(id) {
  const s = state[id].socket;
  if (s) { s.disconnect(); state[id].socket = null; }
  setStatus(id, false);
  state[id].userId = null;
  state[id].email  = null;
  document.getElementById(`userInfo${id}`).textContent = 'Not connected';
}

/* ────────────────────────────────────────────────────────────
   REGISTER ALL SOCKET EVENTS
──────────────────────────────────────────────────────────── */
function registerEvents(id, socket, rawToken) {
  // Decode JWT payload (base64) to show user info
  try {
    const payload = JSON.parse(atob(rawToken.split('.')[1]));
    state[id].userId = payload.sub || payload.userId || payload.id;
    state[id].email  = payload.email || payload.username || `User ${id}`;
    document.getElementById(`userInfo${id}`).textContent =
      `🔑 uid=${state[id].userId}  |  ${state[id].email}`;
  } catch { /* ignore malformed token */ }

  /* ── connection lifecycle ── */
  socket.on('connect', () => {
    setStatus(id, true);
    log(id, 'system', `✅ Connected  (socket id: ${socket.id})`);
  });

  socket.on('disconnect', (reason) => {
    setStatus(id, false);
    log(id, 'system', `❌ Disconnected — ${reason}`);
  });

  socket.on('connect_error', (err) => {
    log(id, 'error', `Connection error: ${err.message}`);
  });

  /* ── conversation join/leave ── */
  socket.on('joined', (data) => {
    log(id, 'recv', 'joined', data);
    state[id].convId = data?.conversationId ?? data?.data?.conversationId;
    addDivider(id, `Joined conversation #${state[id].convId}`);
  });

  socket.on('left', (data) => {
    log(id, 'recv', 'left', data);
    addDivider(id, `Left conversation #${(data?.conversationId ?? data?.data?.conversationId)}`);
  });

  /* ── messages ── */
  socket.on('message_sent', (data) => {
    const msg = data?.data ?? data;
    log(id, 'sent', 'message_sent', msg);
    if (msg.id) state[id].msgCache[msg.id] = msg.text || msg.body || '';
    // Server now returns replyToId properly; fall back to pending reply for safety
    const replyId = msg.replyToId ?? state[id].pendingReply?.id ?? null;
    addBubble(id, 'self', msg.text || msg.body || JSON.stringify(msg), msg.id, msg.sentAt, null, replyId);
    cancelReply(id);
  });

  socket.on('new_message', (data) => {
    const msg = data?.data ?? data;
    const isSelf = String(msg.senderId ?? msg.senderUserId) === String(state[id].userId);
    log(id, 'recv', 'new_message', msg);
    if (msg.id) state[id].msgCache[msg.id] = msg.text || msg.body || '';
    if (isSelf) return;
    const label = `uid:${msg.senderId ?? msg.senderUserId}`;
    addBubble(id, 'other', msg.text || msg.body || JSON.stringify(msg), msg.id, msg.sentAt, label, msg.replyToId ?? null);
  });

  socket.on('new_message_notification', (data) => {
    log(id, 'recv', 'new_message_notification', data);
    const convId  = data?.conversationId;
    const sender  = data?.senderUserId ?? data?.message?.senderId;
    const preview = data?.message?.text || data?.message?.body || '…';
    if (!convId) return;
    // Don't notify if already in this conversation
    if (String(state[id].convId) === String(convId)) return;
    state[id].notifConvId = convId;
    document.getElementById(`notifText${id}`).textContent =
      `📨 New message from uid:${sender} in conv #${convId}: "${preview.slice(0, 40)}"`;
    document.getElementById(`notif${id}`).classList.add('visible');
  });

  /* ── typing ── */
  socket.on('user_typing', (data) => {
    if (String(data?.userId) === String(state[id].userId)) return;
    const action = data?.isTyping ? '✏️ is typing…' : 'stopped typing';
    logTyping(id, `uid:${data?.userId} ${action}`);
  });

  /* ── read receipts — update ticks on all bubbles in this conv ── */
  socket.on('message_read', (data) => {
    log(id, 'read', 'message_read', data);
    // Turn all sent-message ticks to blue ✓✓
    const feed = document.getElementById(`feed${id}`);
    feed.querySelectorAll('.tick').forEach(el => el.classList.add('read'));
  });

  socket.on('read_confirmed', (data) => {
    log(id, 'read', 'read_confirmed', data?.data ?? data);
  });

  /* ── deletion ── */
  socket.on('message_deleted', (data) => {
    log(id, 'deleted', 'message_deleted', data);
    markDeletedBubble(id, data?.messageId);
  });

  socket.on('delete_confirmed', (data) => {
    log(id, 'deleted', 'delete_confirmed', data?.data ?? data);
    markDeletedBubble(id, (data?.data ?? data)?.messageId);
  });

  /* ── edit ── */
  socket.on('message_edited', (data) => {
    log(id, 'recv', 'message_edited', data);
    updateEditedBubble(id, data?.messageId, data?.text, data?.editedAt);
  });

  socket.on('edit_confirmed', (data) => {
    const d = data?.data ?? data;
    log(id, 'recv', 'edit_confirmed', d);
    updateEditedBubble(id, d?.messageId, d?.text, d?.editedAt);
  });

  /* ── user status ── */
  socket.on('user_status', (data) => {
    const badge = data?.isOnline ? '🟢' : '🔴';
    log(id, 'system', `${badge} uid:${data?.userId} is ${data?.isOnline ? 'online' : 'offline'}${data?.lastSeen ? ' (last seen: '+new Date(data.lastSeen).toLocaleTimeString()+')' : ''}`);
  });

  /* ── generic error ── */
  socket.on('error', (data) => {
    log(id, 'error', `Server error: ${(data?.data ?? data)?.message ?? JSON.stringify(data)}`);
  });

  /* ── catch-all ── */
  socket.onAny((event, ...args) => {
    const known = ['connect','disconnect','connect_error','joined','left',
      'message_sent','new_message','new_message_notification','user_typing',
      'message_read','read_confirmed','message_deleted','delete_confirmed',
      'user_status','error'];
    if (!known.includes(event)) {
      log(id, 'recv', `[unknown] ${event}`, args[0] ?? {});
    }
  });
}

/* ────────────────────────────────────────────────────────────
   EMIT HELPERS
──────────────────────────────────────────────────────────── */
function getSocket(id) {
  const s = state[id].socket;
  if (!s || !s.connected) { log(id, 'error', 'Not connected — please connect first.'); return null; }
  return s;
}
function getConvId(id) {
  return parseInt(document.getElementById(`convId${id}`).value, 10) || 1;
}

function joinConv(id) {
  const s = getSocket(id); if (!s) return;
  const convId = getConvId(id);
  s.emit('join_conversation', { conversationId: convId });
  log(id, 'sent', `↑ join_conversation`, { conversationId: convId });
}

function leaveConv(id) {
  const s = getSocket(id); if (!s) return;
  const convId = getConvId(id);
  s.emit('leave_conversation', { conversationId: convId });
  log(id, 'sent', `↑ leave_conversation`, { conversationId: convId });
}

function sendMsg(id) {
  const s = getSocket(id); if (!s) return;
  const text    = document.getElementById(`msg${id}`).value.trim();
  if (!text) return;
  const convId  = getConvId(id);
  const replyTo = state[id].pendingReply?.id ?? null;

  const payload = { conversationId: convId, text, replyToId: replyTo, fileId: null };
  s.emit('send_message', payload);
  log(id, 'sent', `↑ send_message`, payload);
  document.getElementById(`msg${id}`).value = '';
  autoResize(document.getElementById(`msg${id}`));
  emitTyping(id, false);
  // pendingReply is cleared in message_sent handler after rendering quote
}

let typingDebounce = { A: null, B: null };
function emitTyping(id, isTyping) {
  const s = state[id].socket;
  if (!s || !s.connected) return;
  const convId = getConvId(id);

  clearTimeout(typingDebounce[id]);
  if (isTyping) {
    s.emit('typing', { conversationId: convId, isTyping: true });
    typingDebounce[id] = setTimeout(() => {
      if (s.connected) s.emit('typing', { conversationId: convId, isTyping: false });
    }, 2500);
  } else {
    s.emit('typing', { conversationId: convId, isTyping: false });
  }
}

function markRead(id) {
  const s = getSocket(id); if (!s) return;
  const convId = getConvId(id);
  s.emit('mark_read', { conversationId: convId });
  log(id, 'sent', `↑ mark_read`, { conversationId: convId });
}

function deleteMsg(id, forEveryone) {
  const s = getSocket(id); if (!s) return;
  const msgId = parseInt(document.getElementById(`delMsg${id}`).value, 10);
  if (!msgId) { alert('Enter a message ID to delete.'); return; }
  const payload = { messageId: msgId, forEveryone };
  s.emit('delete_message', payload);
  log(id, 'sent', `↑ delete_message`, payload);
}

/* ────────────────────────────────────────────────────────────
   UI HELPERS
──────────────────────────────────────────────────────────── */
function setStatus(id, online) {
  document.getElementById(`dot${id}`).className   = 'dot ' + (online ? 'online' : 'offline');
  const badge = document.getElementById(`badge${id}`);
  badge.textContent  = online ? 'Connected' : 'Disconnected';
  badge.className    = 'status-badge ' + (online ? 'connected' : 'disconnected');
}

function setView(id, mode) {
  state[id].view = mode;
  document.getElementById(`viewBubble${id}`).className = mode === 'bubble' ? 'active' : '';
  document.getElementById(`viewLog${id}`).className    = mode === 'log'    ? 'active' : '';
}

function clearFeed(id) {
  document.getElementById(`feed${id}`).innerHTML = '';
}

function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

/* Log item (event log view) */
function log(id, type, eventName, payload) {
  const feed = document.getElementById(`feed${id}`);
  const item = document.createElement('div');
  item.className = `log-item ${type}`;

  const hasPayload = payload !== undefined;
  const label = hasPayload ? eventName : '';
  const text  = hasPayload ? '' : eventName;

  item.innerHTML = `
    <span class="ts">${ts()}</span>
    ${label ? `<span class="event-tag">${label}</span>` : ''}
    ${text}
    ${hasPayload ? `<pre>${JSON.stringify(payload, null, 2)}</pre>` : ''}
  `;

  // Always append to feed (both views share the same feed but bubbles are added separately)
  if (state[id].view === 'log' || type === 'system' || type === 'error' || type === 'typing' || type === 'read' || type === 'deleted') {
    feed.appendChild(item);
    feed.scrollTop = feed.scrollHeight;
  }
}

/* Bubble view */
function addBubble(id, side, text, msgId, sentAt, senderLabel, replyToId) {
  if (state[id].view !== 'bubble') return;
  const feed = document.getElementById(`feed${id}`);

  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${side}`;
  if (msgId) wrap.dataset.msgId = msgId;

  const time = sentAt ? new Date(sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ts();
  const nameHtml = (side === 'other' && senderLabel) ? `<div class="bubble-sender">${senderLabel}</div>` : '';
  const tick = side === 'self' ? `<span class="tick" data-tick="${msgId}">✓✓</span>` : '';

  // Quote block — look up the original message text from cache
  let quoteHtml = '';
  if (replyToId) {
    const quoted = state[id].msgCache[replyToId] || '…';
    quoteHtml = `<div class="quote-block"><span class="quote-id">↩ #${replyToId}</span>${escHtml(quoted.slice(0, 80))}${quoted.length > 80 ? '…' : ''}</div>`;
  }

  wrap.innerHTML = `
    ${nameHtml}
    <div class="bubble">${quoteHtml}${escHtml(text)}</div>
    <div class="bubble-meta">
      ${time}${msgId ? ' · #' + msgId : ''} ${tick}
      <span class="bubble-actions">
        <a href="#" class="action-reply" title="Reply">↩</a>
        ${side === 'self' ? `<a href="#" class="action-edit" title="Edit">✏️</a>` : ''}
      </span>
    </div>
  `;

  // Reply action
  const replyBtn = wrap.querySelector('.action-reply');
  if (replyBtn) {
    replyBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!msgId) return;
      const replyText = text.slice(0, 50);
      state[id].pendingReply = { id: msgId, text: replyText };
      document.getElementById(`replyTo${id}`).value = msgId;
      document.getElementById(`replyBar${id}`).classList.add('visible');
      document.getElementById(`replyPreview${id}`).textContent = `#${msgId}: "${replyText}"`;
      document.getElementById(`msg${id}`).focus();
    });
  }

  // Edit action (self messages only)
  const editBtn = wrap.querySelector('.action-edit');
  if (editBtn) {
    editBtn.addEventListener('click', (e) => {
      e.preventDefault();
      editMessage(id, msgId);
    });
  }

  feed.appendChild(wrap);
  feed.scrollTop = feed.scrollHeight;
}

function markDeletedBubble(id, msgId) {
  if (!msgId) return;
  const feed = document.getElementById(`feed${id}`);
  const wrap = feed.querySelector(`[data-msg-id="${msgId}"]`);
  if (wrap) {
    const bubble = wrap.querySelector('.bubble');
    if (bubble) {
      bubble.style.opacity = '.5';
      bubble.style.textDecoration = 'line-through';
      bubble.textContent = '🗑 This message was deleted';
    }
  }
}

function updateEditedBubble(id, msgId, newText, editedAt) {
  if (!msgId) return;
  const feed = document.getElementById(`feed${id}`);
  const wrap = feed.querySelector(`[data-msg-id="${msgId}"]`);
  if (wrap) {
    const bubble = wrap.querySelector('.bubble');
    if (bubble) {
      // Keep the quote block if any, update only the text node
      const quoteEl = bubble.querySelector('.quote-block');
      const textParts = [];
      if (quoteEl) textParts.push(quoteEl.outerHTML);
      textParts.push(newText);
      textParts.push(`<span style="font-size:.65rem;color:var(--muted);margin-left:6px;">(edited)</span>`);
      bubble.innerHTML = textParts.join('');
    }
    // Update cache
    if (state[id].msgCache) state[id].msgCache[msgId] = newText;
  }
}

function editMessage(id, msgId) {
  const s = getSocket(id); if (!s) return;
  const currentText = state[id].msgCache[msgId] || '';
  const newText = prompt('Edit message:', currentText);
  if (newText === null || newText.trim() === '' || newText === currentText) return;
  s.emit('edit_message', { messageId: msgId, text: newText.trim() });
  log(id, 'sent', '↑ edit_message', { messageId: msgId, text: newText.trim() });
}

let searchTimers = { A: null, B: null };
function searchUsers(id) {
  clearTimeout(searchTimers[id]);
  const query = document.getElementById(`userSearch${id}`).value.trim();
  const resultsEl = document.getElementById(`searchResults${id}`);
  if (query.length < 2) { resultsEl.classList.remove('visible'); return; }
  searchTimers[id] = setTimeout(async () => {
    const token = document.getElementById(`token${id}`).value.trim();
    if (!token) return;
    try {
      const res = await fetch(`${SERVER_URL}/api/messages/users/search?query=${encodeURIComponent(query)}&limit=10`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) return;
      const users = await res.json();
      if (!users.length) { resultsEl.innerHTML = '<div class="search-result-item" style="color:var(--muted)">No users found</div>'; resultsEl.classList.add('visible'); return; }
      resultsEl.innerHTML = users.map(u =>
        `<div class="search-result-item" onclick="pickUser('${id}', ${u.userId}, '${u.firstName} ${u.lastName}')">
          <span class="sr-name">${u.firstName} ${u.lastName}</span>
          <span class="sr-email">${u.email}</span>
          <span class="sr-uid">#${u.userId}</span>
        </div>`
      ).join('');
      resultsEl.classList.add('visible');
    } catch {}
  }, 300);
}

function pickUser(id, uid, name) {
  document.getElementById(`targetUid${id}`).value = uid;
  document.getElementById(`userSearch${id}`).value = name;
  document.getElementById(`searchResults${id}`).classList.remove('visible');
}
// Close search dropdown on click outside
document.addEventListener('click', (e) => {
  ['A','B'].forEach(id => {
    const el = document.getElementById(`searchResults${id}`);
    if (el && !e.target.closest('.start-chat')) el.classList.remove('visible');
  });
});

function addDivider(id, text) {
  const feed = document.getElementById(`feed${id}`);
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = text;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function cancelReply(id) {
  state[id].pendingReply = null;
  document.getElementById(`replyTo${id}`).value = '';
  document.getElementById(`replyBar${id}`).classList.remove('visible');
  document.getElementById(`replyPreview${id}`).textContent = '';
}

let typingDisplayTimers = { A: null, B: null };
function logTyping(id, text) {
  const feed = document.getElementById(`feed${id}`);
  let el = feed.querySelector('.typing-indicator');
  if (!el) {
    el = document.createElement('div');
    el.className = 'log-item typing typing-indicator';
    feed.appendChild(el);
  }
  el.innerHTML = `<span class="ts">${ts()}</span> ${text}`;
  feed.scrollTop = feed.scrollHeight;

  clearTimeout(typingDisplayTimers[id]);
  typingDisplayTimers[id] = setTimeout(() => { el.remove(); }, 3500);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── init log ── */
log('A', 'system', 'Panel A ready — login or paste a JWT token to connect.');
log('B', 'system', 'Panel B ready — login or paste a JWT token to connect.');
</script>
<!-- ══ NEW CONVERSATION MODAL ══════════════════════════════════ -->
<div class="modal-overlay" id="newConvModal">
  <div class="modal">
    <h3>💬 Start New Conversation</h3>
    <label>Type</label>
    <select id="newConvType" onchange="toggleGroupName()">
      <option value="direct">Direct Message</option>
      <option value="group">Group Chat</option>
    </select>
    <div id="groupNameWrap" style="display:none;">
      <label>Group Name</label>
      <input id="newConvGroupName" placeholder="e.g. Study Group" />
    </div>
    <label>Participant User IDs <span style="color:var(--muted)">(comma-separated, e.g. 58)</span></label>
    <input id="newConvParticipants" placeholder="58, 59, 60" />
    <label>First Message</label>
    <textarea id="newConvText" rows="2" placeholder="Hello!"></textarea>
    <input type="hidden" id="newConvPanelId" value="A" />
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeNewConvModal()">Cancel</button>
      <button class="btn-primary" onclick="createConversation()">Create &amp; Join</button>
    </div>
  </div>
</div>

<script>
/* ── Existing state/config vars defined above in the other script block ── */

/* ────────────────────────────────────────────────────────────
   LOAD CONVERSATIONS FROM REST API
──────────────────────────────────────────────────────────── */
async function loadConvs(id) {
  const token = document.getElementById(`token${id}`).value.trim();
  if (!token) { log(id, 'error', 'Connect first before loading conversations.'); return; }
  try {
    const res = await fetch(`${SERVER_URL}/api/messages/conversations`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    if (!res.ok) return;
    const data = await res.json();
    const convs = Array.isArray(data) ? data
                : Array.isArray(data.conversations) ? data.conversations
                : Array.isArray(data.data) ? data.data : [];
    return convs;
  } catch { return []; }
}

/* ────────────────────────────────────────────────────────────
   START CHAT BY USER ID
──────────────────────────────────────────────────────────── */
async function startChat(id) {
  const token = document.getElementById(`token${id}`).value.trim();
  if (!token) { alert(`Panel ${id}: connect first.`); return; }

  const targetUid = parseInt(document.getElementById(`targetUid${id}`).value, 10);
  if (!targetUid || isNaN(targetUid)) { alert('Enter the other user\'s uid.'); return; }

  const firstMsg = document.getElementById(`firstMsg${id}`).value.trim() || 'Hello!';

  const body = { participantIds: [targetUid], type: 'direct', text: firstMsg };
  log(id, 'sent', '↑ POST /api/messages/conversations', body);

  try {
    const res = await fetch(`${SERVER_URL}/api/messages/conversations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { log(id, 'error', `Start chat failed: ${JSON.stringify(data)}`); return; }

    const convId = data.conversationId ?? data.id ?? data.data?.conversationId;
    log(id, 'recv', `✅ ${data.existing ? 'Existing' : 'New'} conversation #${convId}`, data);
    if (convId) {
      document.getElementById(`convId${id}`).value = convId;
      joinConv(id);
      document.getElementById(`firstMsg${id}`).value = '';
    }
  } catch (e) {
    log(id, 'error', `Start chat error: ${e.message}`);
  }
}

function joinNotifConv(id) {
  const convId = state[id].notifConvId;
  if (!convId) return;
  document.getElementById(`convId${id}`).value = convId;
  joinConv(id);
  dismissNotif(id);
}

function dismissNotif(id) {
  state[id].notifConvId = null;
  document.getElementById(`notif${id}`).classList.remove('visible');
}

/* ─── Group Chat Modal ──────────────────────────────────────────── */
function openNewConvModal(id) {
  const token = document.getElementById(`token${id}`).value.trim();
  if (!token) { alert('Connect as Panel ' + id + ' first.'); return; }
  document.getElementById('newConvPanelId').value = id;
  document.getElementById('newConvModal').classList.add('open');
}
function closeNewConvModal() {
  document.getElementById('newConvModal').classList.remove('open');
}
function toggleGroupName() {
  document.getElementById('groupNameWrap').style.display =
    document.getElementById('newConvType').value === 'group' ? 'block' : 'none';
}
async function createConversation() {
  const id    = document.getElementById('newConvPanelId').value;
  const token = document.getElementById(`token${id}`).value.trim();
  const type  = document.getElementById('newConvType').value;
  const text  = document.getElementById('newConvText').value.trim();
  const rawIds = document.getElementById('newConvParticipants').value.trim();
  const groupName = document.getElementById('newConvGroupName').value.trim();

  if (!text)   { alert('First message is required.'); return; }
  if (!rawIds) { alert('Enter at least one participant user ID.'); return; }
  const participantIds = rawIds.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
  if (!participantIds.length) { alert('Invalid participant IDs.'); return; }

  const body = { participantIds, type, text, ...(type === 'group' && groupName ? { groupName } : {}) };
  log(id, 'sent', '↑ POST /api/messages/conversations', body);
  try {
    const res = await fetch(`${SERVER_URL}/api/messages/conversations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { log(id, 'error', `Create failed: ${JSON.stringify(data)}`); return; }
    const convId = data.conversationId ?? data.id ?? data.data?.conversationId;
    log(id, 'recv', `✅ Conv #${convId} ${data.existing ? '(existing)' : 'created'}`, data);
    closeNewConvModal();
    if (convId) {
      document.getElementById(`convId${id}`).value = convId;
      joinConv(id);
    }
    document.getElementById('newConvText').value = '';
    document.getElementById('newConvParticipants').value = '';
  } catch (e) { log(id, 'error', `Create error: ${e.message}`); }
}

// Close modal on backdrop click
document.getElementById('newConvModal').addEventListener('click', function(e) {
  if (e.target === this) closeNewConvModal();
});

</script>
</body>
</html>
